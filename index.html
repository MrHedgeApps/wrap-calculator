<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Hedge Wrap Calculator & Maps</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #4caf50;
            --peg-color: #ff9800;
            --spot-color: #f44336;
            --lock-color: #f44336;
            --unlock-color: #4caf50;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --input-bg: #2d2d2d;
            --border-color: #3d3d3d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--accent-color);
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        select, button.lock-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button.lock-btn {
            border-width: 2px;
        }

        button.lock-btn.state-locked {
            border-color: var(--lock-color);
            color: var(--lock-color);
            background-color: rgba(244, 67, 54, 0.05);
        }

        button.lock-btn.state-unlocked {
            border-color: var(--unlock-color);
            color: var(--unlock-color);
            background-color: rgba(76, 175, 80, 0.05);
        }

        .mode-container {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--border-color) !important;
            color: var(--text-muted) !important;
            background-color: var(--input-bg) !important;
        }

        .mode-btn.active-peg {
            border-color: var(--peg-color);
            background-color: rgba(255, 152, 0, 0.15);
            color: var(--peg-color);
        }

        .mode-btn.active-spot {
            border-color: var(--spot-color);
            background-color: rgba(244, 67, 54, 0.15);
            color: var(--spot-color);
        }

        .map-viewport {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: #181818;
            touch-action: none;
        }

        .zoom-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            cursor: grab;
        }

        .zoom-content:active { cursor: grabbing; }

        .map-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .pin {
            position: absolute;
            width: var(--base-size, 16px);
            height: var(--base-size, 16px);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 10;
            border: 2px solid #fff;
            pointer-events: none;
        }

        .pin.peg { background-color: var(--peg-color); --base-size: 16px; } 
        .pin.spot { background-color: var(--spot-color); --base-size: 16px; } 

        #mapSvg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .result-container {
            padding: 14px;
            background-color: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            text-align: center;
        }

        .result-title {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .result-value { font-size: 1.6rem; font-weight: bold; }
        .result-distance { font-size: 1rem; color: var(--text-color); margin-top: 2px; font-weight: 500; }
        .result-note { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; }

        .instructions {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        .zoom-tip {
            font-size: 0.75rem;
            color: var(--accent-color);
            text-align: center;
            margin-top: 4px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Hedge Wrap Calculator</h2>
        
        <div class="controls-grid">
            <div>
                <label for="lakeSelect">CHOOSE LAKE</label>
                <select id="lakeSelect" onchange="handleLakeChange()">
                    <option value="Astral.png">Astral Park Lake</option>
                    <option value="Lake2.png">Lake 2 (Pending)</option>
                    <option value="Lake3.png">Lake 3 (Pending)</option>
                </select>
            </div>
            <div>
                <label for="rodLength">ROD LENGTH</label>
                <select id="rodLength" onchange="calculateWraps()">
                    <option value="9">9 ft</option>
                    <option value="10">10 ft</option>
                    <option value="11">11 ft</option>
                    <option value="12" selected>12 ft</option>
                    <option value="13">13 ft</option>
                </select>
            </div>
        </div>

        <div class="controls-grid" style="margin-bottom: 15px; grid-template-columns: 1fr;">
            <div>
                <label>SAFETY LOCK</label>
                <button id="btnLockToggle" class="lock-btn state-locked" onclick="toggleSafetyLock()">🔒 Map Controls: Locked</button>
            </div>
        </div>

        <div class="mode-container">
            <button id="btnSetPeg" class="mode-btn" onclick="setPlacementMode('peg')" disabled>📍 Set Peg</button>
            <button id="btnSetTarget" class="mode-btn" onclick="setPlacementMode('spot')" disabled>🎯 Set Target</button>
        </div>

        <div class="map-viewport" id="mapViewport">
            <div class="zoom-content" id="zoomContent">
                <img src="Astral.png" alt="Lake Depth Map" class="map-image" id="lakeMap">
                <svg id="mapSvg"></svg>
                <div id="pegPin" class="pin peg" style="display: none;"></div>
                <div id="spotPin" class="pin spot" style="display: none;"></div>
            </div>
        </div>
        
        <div class="zoom-tip">💡 Pinch to Zoom / Drag to Pan map area</div>
        <div class="instructions" id="instructionText">Pins are locked down. Unlock safety switch above to make edits.</div>
    </div>

    <div class="card result-container">
        <div class="result-title">Target Calculation</div>
        <div id="resultValue" class="result-value">0 wraps</div>
        <div id="resultDistance" class="result-distance">Distance: --</div>
        <div id="resultNote" class="result-note">Ensure both Peg and Target positions are marked on the map layout.</div>
    </div>
</div>

<script>
    let isMapLocked = true; // Hard default state
    let activePlacementMode = 'none'; 
    let pegPoint = null; 
    let spotPoint = null;

    let scale = 1;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let startX, startY;
    let initialPinchDist = null;

    const viewport = document.getElementById('mapViewport');
    const content = document.getElementById('zoomContent');
    const mapImage = document.getElementById('lakeMap');

    const LAKE_CONFIGS = {
        "Astral.png": { scaleRatio: 262 / 960, scaleRealMetres: 200 },
        "Lake2.png": { scaleRatio: 1.0, scaleRealMetres: 100 },
        "Lake3.png": { scaleRatio: 1.0, scaleRealMetres: 100 }
    };

    setupPanZoomEvents();

    function toggleSafetyLock() {
        isMapLocked = !isMapLocked;
        const lockBtn = document.getElementById('btnLockToggle');
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');

        if (isMapLocked) {
            lockBtn.className = "lock-btn state-locked";
            lockBtn.innerHTML = "🔒 Map Controls: Locked";
            
            pegBtn.disabled = true;
            targetBtn.disabled = true;
            pegBtn.className = "mode-btn";
            targetBtn.className = "mode-btn";
            
            activePlacementMode = 'none';
            text.innerText = "Pins are locked down. Unlock safety switch above to make edits.";
        } else {
            lockBtn.className = "lock-btn state-unlocked";
            lockBtn.innerHTML = "🔓 Map Controls: Unlocked";
            
            pegBtn.disabled = false;
            targetBtn.disabled = false;
            
            // Auto-default to peg placement when clicking unlock
            setPlacementMode('peg');
        }
    }

    function setPlacementMode(mode) {
        if (isMapLocked) return;
        
        activePlacementMode = mode;
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');

        if (mode === 'peg') {
            pegBtn.className = "mode-btn active-peg";
            targetBtn.className = "mode-btn";
            text.innerText = "Mode: Setting Peg. Tap map to place swim position.";
        } else {
            pegBtn.className = "mode-btn";
            targetBtn.className = "mode-btn active-spot";
            text.innerText = "Mode: Setting Target. Tap map to adjust target fishing spot.";
        }
    }

    function setupPanZoomEvents() {
        viewport.addEventListener('pointerdown', onPointerDown);
        viewport.addEventListener('pointermove', onPointerMove);
        viewport.addEventListener('pointerup', onPointerUp);
        viewport.addEventListener('pointercancel', onPointerUp);
        viewport.addEventListener('wheel', onWheel, { passive: false });

        viewport.addEventListener('touchstart', onTouchStart, { passive: true });
        viewport.addEventListener('touchmove', onTouchMove, { passive: false });
        viewport.addEventListener('touchend', onTouchEnd);
    }

    function onPointerDown(e) {
        isDragging = true;
        startX = e.clientX - panX;
        startY = e.clientY - panY;
    }

    function onPointerMove(e) {
        if (!isDragging) return;
        if (e.pointerType === 'touch' && initialPinchDist !== null) return;
        
        panX = e.clientX - startX;
        panY = e.clientY - startY;
        applyTransform();
    }

    function onPointerUp(e) {
        if (!isDragging) return;
        isDragging = false;

        const deltaX = Math.abs(e.clientX - (startX + panX));
        const deltaY = Math.abs(e.clientY - (startY + panY));
        if (deltaX < 5 && deltaY < 5) {
            handleMapTap(e);
        }
    }

    function onWheel(e) {
        e.preventDefault();
        const zoomFactor = 1.1;
        const mouseX = e.clientX - viewport.getBoundingClientRect().left;
        const mouseY = e.clientY - viewport.getBoundingClientRect().top;

        const contentX = (mouseX - panX) / scale;
        const contentY = (mouseY - panY) / scale;

        if (e.deltaY < 0) {
            scale = Math.min(scale * zoomFactor, 6);
        } else {
            scale = Math.max(scale / zoomFactor, 1);
        }

        panX = mouseX - contentX * scale;
        panY = mouseY - contentY * scale;
        
        applyTransform();
    }

    function onTouchStart(e) {
        if (e.touches.length === 2) {
            initialPinchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        }
    }

    function onTouchMove(e) {
        if (e.touches.length === 2 && initialPinchDist !== null) {
            e.preventDefault();
            const currentDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - viewport.getBoundingClientRect().left;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - viewport.getBoundingClientRect().top;

            const contentX = (midX - panX) / scale;
            const contentY = (midY - panY) / scale;

            const zoomRatio = currentDist / initialPinchDist;
            scale = Math.max(1, Math.min(scale * zoomRatio, 6));

            panX = midX - contentX * scale;
            panY = midY - contentY * scale;

            initialPinchDist = currentDist;
            applyTransform();
        }
    }

    function onTouchEnd() { initialPinchDist = null; }

    function applyTransform() {
        const maxPanX = viewport.clientWidth * (scale - 1);
        const maxPanY = viewport.clientHeight * (scale - 1);
        
        if (panX > 0) panX = 0;
        if (panY > 0) panY = 0;
        if (panX < -maxPanX) panX = -maxPanX;
        if (panY < -maxPanY) panY = -maxPanY;

        content.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        
        const currentPinSize = Math.max(6, 16 / scale);
        const currentStrokeWidth = Math.max(1, 2.5 / scale);
        
        document.querySelectorAll('.pin').forEach(pin => {
            pin.style.width = currentPinSize + 'px';
            pin.style.height = currentPinSize + 'px';
            pin.style.borderWidth = Math.max(1, 2 / scale) + 'px';
        });

        const targetLine = document.querySelector('#mapSvg line');
        if (targetLine) {
            targetLine.setAttribute('stroke-width', currentStrokeWidth);
        }
    }

    function handleMapTap(e) {
        // Strict guard: if the app is safe-locked, skip editing pins entirely
        if (isMapLocked || activePlacementMode === 'none') return;

        const rect = content.getBoundingClientRect();
        const clickXOnContent = (e.clientX - rect.left) / scale;
        const clickYOnContent = (e.clientY - rect.top) / scale;

        const x = clickXOnContent / content.clientWidth;
        const y = clickYOnContent / content.clientHeight;

        if (activePlacementMode === 'peg') {
            pegPoint = { x, y };
            const pin = document.getElementById('pegPin');
            pin.style.left = (x * 100) + '%';
            pin.style.top = (y * 100) + '%';
            pin.style.display = 'block';
        } else if (activePlacementMode === 'spot') {
            spotPoint = { x, y };
            const pin = document.getElementById('spotPin');
            pin.style.left = (x * 100) + '%';
            pin.style.top = (y * 100) + '%';
            pin.style.display = 'block';
        }

        drawConnectingLine();
        calculateWraps();
        applyTransform();
    }

    function handleLakeChange() {
        document.getElementById('lakeMap').src = document.getElementById('lakeSelect').value;
        scale = 1; panX = 0; panY = 0;
        applyTransform();
        
        // Force the layout back to a safe locked state when swapping venues
        if (!isMapLocked) toggleSafetyLock();
        resetMarkers();
    }

    function drawConnectingLine() {
        const svg = document.getElementById('mapSvg');
        if (!pegPoint || !spotPoint) {
            svg.innerHTML = '';
            return;
        }
        svg.innerHTML = `
            <line x1="${pegPoint.x * 100}%" y1="${pegPoint.y * 100}%" 
                  x2="${spotPoint.x * 100}%" y2="${spotPoint.y * 100}%" 
                  stroke="#4caf50" stroke-width="2.5" />
        `;
    }

    function clearResults() {
        document.getElementById('resultValue').innerText = "0 wraps";
        document.getElementById('resultDistance').innerText = "Distance: --";
        document.getElementById('resultNote').innerText = "Ensure both Peg and Target positions are marked on the map layout.";
    }

    function resetMarkers() {
        pegPoint = null; spotPoint = null;
        document.getElementById('pegPin').style.display = 'none';
        document.getElementById('spotPin').style.display = 'none';
        document.getElementById('mapSvg').innerHTML = '';
        clearResults();
    }

    function calculateWraps() {
        if (!pegPoint || !spotPoint) return;

        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];

        const currentWidth = content.clientWidth;
        const currentHeight = content.clientHeight;

        const x1 = pegPoint.x * currentWidth;
        const y1 = pegPoint.y * currentHeight;
        const x2 = spotPoint.x * currentWidth;
        const y2 = spotPoint.y * currentHeight;

        const pixelDistance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        const scaleBarPixels = currentWidth * config.scaleRatio;
        
        const calculatedMetres = (pixelDistance / scaleBarPixels) * config.scaleRealMetres;
        const calculatedTotalFeet = calculatedMetres / 0.3048;

        const rodLength = parseFloat(document.getElementById('rodLength').value);
        const fullWraps = Math.floor(calculatedTotalFeet / rodLength);
        const remainingFeet = calculatedTotalFeet % rodLength;

        document.getElementById('resultDistance').innerText = `Distance: ${calculatedMetres.toFixed(1)}m (${(calculatedMetres * 1.09361).toFixed(1)}yds)`;

        let outputText = `${fullWraps} wrap${fullWraps !== 1 ? 's' : ''}`;
        if (remainingFeet > 0.05) {
            outputText += ` + ${remainingFeet.toFixed(1)} ft`;
        }
        document.getElementById('resultValue').innerText = outputText;

        if (remainingFeet > 0.05) {
            const shortOfStick = rodLength - remainingFeet;
            document.getElementById('resultNote').innerText = `On wrap ${fullWraps + 1}, stop ${shortOfStick.toFixed(1)} ft short of the opposite stick.`;
        } else {
            document.getElementById('resultNote').innerText = `Perfect alignment. Match the stick target exactly on wrap ${fullWraps}.`;
        }
    }

    window.addEventListener('resize', () => {
        if (pegPoint && spotPoint) {
            drawConnectingLine();
            calculateWraps();
        }
        applyTransform();
    });
</script>

</body>
</html>
