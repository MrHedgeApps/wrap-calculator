<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Hedge Wrap Calculator</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #4caf50;
            --peg-color: #ff9800;
            --spot-color: #f44336;
            --lock-color: #f44336;
            --unlock-color: #4caf50;
            --text-color: #e0e0e0;
            --text-muted: #999999;
            --input-bg: #262626;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin: 0 0 14px 0;
            text-align: center;
            color: var(--accent-color);
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, button.lock-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button.lock-btn {
            border-width: 2px;
            letter-spacing: 0.5px;
        }

        button.lock-btn.state-locked {
            border-color: var(--lock-color);
            color: var(--lock-color);
            background-color: rgba(244, 67, 54, 0.08);
        }

        button.lock-btn.state-unlocked {
            border-color: var(--unlock-color);
            color: var(--unlock-color);
            background-color: rgba(76, 175, 80, 0.08);
        }

        .mode-container {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-muted);
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .mode-btn.active-peg {
            border-color: var(--peg-color);
            background-color: rgba(255, 152, 0, 0.2);
            color: var(--peg-color);
        }

        .mode-btn.active-spot {
            border-color: var(--spot-color);
            background-color: rgba(244, 67, 54, 0.2);
            color: var(--spot-color);
        }

        /* The viewport height is now fluidly managed dynamically by JavaScript */
        .map-viewport {
            position: relative;
            width: 100%;
            height: auto;
            min-height: 200px;
            overflow: hidden;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: #111111;
            touch-action: pan-y;
        }

        .zoom-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mapSvg {
            width: 100%;
            height: 100%;
            z-index: 5;
            box-sizing: border-box;
            background: transparent;
            display: block;
        }

        .result-container {
            padding: 14px;
            background-color: rgba(76, 175, 80, 0.08);
            border: 1px solid var(--accent-color);
            border-radius: 10px;
            text-align: center;
        }

        .result-title {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .result-value { font-size: 1.7rem; font-weight: 800; color: #fff; }
        .result-distance { font-size: 1.1rem; color: #fff; margin-top: 3px; font-weight: 600; }
        .result-note { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; line-height: 1.3; }

        .instructions {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        .precision-tip {
            font-size: 0.7rem;
            color: var(--accent-color);
            text-align: center;
            margin-top: 5px;
            opacity: 0.7;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Hedge Wraps</h2>
        
        <div class="controls-grid">
            <div>
                <label for="lakeSelect">CHOOSE LAKE</label>
                <select id="lakeSelect" onchange="handleLakeChange()">
                    <option value="Astral.png">Astral Park Lake</option>
                    <option value="Tiddenfoot.png">Tiddenfoot Lake</option>
                    <option value="Lake3.png">Lake 3 (Pending)</option>
                </select>
            </div>
            <div>
                <label for="rodLength">ROD LENGTH</label>
                <select id="rodLength" onchange="saveAndCalculate()">
                    <option value="9">9 ft</option>
                    <option value="10">10 ft</option>
                    <option value="11">11 ft</option>
                    <option value="12" selected>12 ft</option>
                    <option value="13">13 ft</option>
                </select>
            </div>
        </div>

        <div class="controls-grid" style="grid-template-columns: 1fr;">
            <div>
                <label>SAFETY LOCK</label>
                <button id="btnLockToggle" class="lock-btn state-locked" onclick="toggleSafetyLock()">🔒 MAP LOCKED</button>
            </div>
        </div>

        <div class="mode-container">
            <button id="btnSetPeg" class="mode-btn" onclick="togglePlacementMode('peg')" disabled>📍 Peg</button>
            <button id="btnSetTarget" class="mode-btn" onclick="togglePlacementMode('spot')" disabled>🎯 Spot</button>
        </div>

        <div class="map-viewport" id="mapViewport">
            <div class="zoom-content" id="zoomContent">
                <svg id="mapSvg" xmlns="http://www.w3.org/2000/svg">
                    <image id="svgMapImage" href="Astral.png" x="0" y="0" width="100%" height="100%" />
                    <g id="lineGroup"></g>
                    <g id="dotGroup"></g>
                </svg>
            </div>
        </div>
        
        <div class="precision-tip">💡 Markers are precision calibrated to roughly 1m x 1m at max zoom.</div>
        <div class="instructions" id="instructionText">Map is safety-locked. Unlock above to drop markers.</div>
    </div>

    <div class="card result-container">
        <div class="result-title">Target Geometry</div>
        <div id="resultValue" class="result-value">0 wraps</div>
        <div id="resultDistance" class="result-distance">Distance: --</div>
        <div id="resultNote" class="result-note">Ensure both Peg and Target positions are marked on the map layout.</div>
    </div>
</div>

<script>
    let isMapLocked = true; 
    let activePlacementMode = 'none'; 
    let pegPoint = null; 
    let spotPoint = null;

    let scale = 1; let panX = 0; let panY = 0;
    let isDragging = false; let startX, startY; let initialPinchDist = null;

    const viewport = document.getElementById('mapViewport');
    const content = document.getElementById('zoomContent');
    const svgCanvas = document.getElementById('mapSvg');

    const LAKE_CONFIGS = {
        "Astral.png": { 
            originalWidth: 960,  
            originalHeight: 816,
            pixelsPerMetre: 262 / 200 
        },
        "Tiddenfoot.png": { 
            originalWidth: 960,  
            originalHeight: 684,
            pixelsPerMetre: 176 / 100 
        },
        "Lake3.png": { originalWidth: 1000, originalHeight: 1000, pixelsPerMetre: 5.0 }
    };

    setupPanZoomEvents();
    loadLakeState();

    function setupPanZoomEvents() {
        viewport.addEventListener('pointerdown', (e) => {
            if (isMapLocked) return; 
            isDragging = true;
            startX = e.clientX - panX; startY = e.clientY - panY;
            viewport.setPointerCapture(e.pointerId);
        });

        viewport.addEventListener('pointermove', (e) => {
            if (!isDragging || isMapLocked) return; 
            if (e.pointerType === 'touch' && initialPinchDist !== null) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            applyTransform();
        });

        viewport.addEventListener('pointerup', (e) => {
            if (isMapLocked) {
                handleMapTap(e);
                return;
            }
            if (!isDragging) return;
            isDragging = false;
            viewport.releasePointerCapture(e.pointerId);

            const deltaX = Math.abs(e.clientX - (startX + panX));
            const deltaY = Math.abs(e.clientY - (startY + panY));
            if (deltaX < 5 && deltaY < 5) {
                handleMapTap(e);
            }
        });

        viewport.addEventListener('pointercancel', () => { isDragging = false; });

        viewport.addEventListener('wheel', (e) => {
            if (isMapLocked) return; 
            e.preventDefault();
            const zoomFactor = 1.1;
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const contentX = (mouseX - panX) / scale;
            const contentY = (mouseY - panY) / scale;

            if (e.deltaY < 0) {
                scale = Math.min(scale * zoomFactor, 6); 
            } else {
                scale = Math.max(scale / zoomFactor, 1); 
            }

            panX = mouseX - contentX * scale;
            panY = mouseY - contentY * scale;
            applyTransform();
        }, { passive: false });

        viewport.addEventListener('touchstart', (e) => {
            if (isMapLocked) return; 
            if (e.touches.length === 2) {
                e.preventDefault();
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', (e) => {
            if (isMapLocked) return; 
            e.preventDefault(); 
            if (e.touches.length === 2 && initialPinchDist !== null) {
                const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                
                const rect = viewport.getBoundingClientRect();
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;

                const contentX = (midX - panX) / scale;
                const contentY = (midY - panY) / scale;

                const zoomRatio = currentDist / initialPinchDist;
                scale = Math.max(1, Math.min(scale * zoomRatio, 6));

                panX = midX - contentX * scale;
                panY = midY - contentY * scale;

                initialPinchDist = currentDist;
                applyTransform();
            }
        }, { passive: false });

        viewport.addEventListener('touchend', () => { initialPinchDist = null; });
    }

    function syncCanvasGeometry() {
        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];
        
        // AUTOMATED HEIGHT CORRECTION FACTOR
        // Calculates available layout width on device and alters viewport container box height to prevent letterboxing
        const currentContainerWidth = viewport.clientWidth;
        const aspectCorrectedHeight = (config.originalHeight / config.originalWidth) * currentContainerWidth;
        
        // Lock heights matching the custom graphic limits directly
        viewport.style.height = aspectCorrectedHeight + 'px';
        
        svgCanvas.setAttribute('viewBox', `0 0 ${config.originalWidth} ${config.originalHeight}`);
        document.getElementById('svgMapImage').setAttribute('href', activeLakeFile);
        
        renderGraphicsLayer();
    }

    function applyTransform() {
        const maxPanX = viewport.clientWidth * (scale - 1);
        const maxPanY = viewport.clientHeight * (scale - 1);
        
        if (panX > 0) panX = 0; if (panY > 0) panY = 0;
        if (panX < -maxPanX) panX = -maxPanX; if (panY < -maxPanY) panY = -maxPanY;

        content.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        saveLakeStateValuesOnly();
        
        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];
        const connectingLine = document.querySelector('#lineGroup line');
        if (connectingLine) {
            const baseStroke = (config.originalWidth / 960) * 2.5;
            connectingLine.setAttribute('stroke-width', Math.max(0.5, baseStroke / scale));
        }
    }

    function handleMapTap(e) {
        if (activePlacementMode === 'none' || initialPinchDist !== null) return;

        // FIXED STRUCTURAL COORDINATE CALCULATOR
        // Grabs point data relative to the exact inverse projection mapping matrix of the clean SVG canvas layout
        const point = svgCanvas.createSVGPoint();
        point.x = e.clientX;
        point.y = e.clientY;
        
        const transformedPoint = point.matrixTransform(svgCanvas.getScreenCTM().inverse());
        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];

        if (transformedPoint.x < 0 || transformedPoint.x > config.originalWidth || transformedPoint.y < 0 || transformedPoint.y > config.originalHeight) return;

        if (activePlacementMode === 'peg') {
            pegPoint = { x: transformedPoint.x, y: transformedPoint.y };
        } else if (activePlacementMode === 'spot') {
            spotPoint = { x: transformedPoint.x, y: transformedPoint.y };
        }

        renderGraphicsLayer(); 
        saveAndCalculate();
        resetPlacementState();
    }

    function renderGraphicsLayer() {
        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];

        const pegColor = getComputedStyle(document.documentElement).getPropertyValue('--peg-color').trim();
        const spotColor = getComputedStyle(document.documentElement).getPropertyValue('--spot-color').trim();
        const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();

        const lineGroup = document.getElementById('lineGroup');
        if (pegPoint && spotPoint) {
            const baseStroke = (config.originalWidth / 960) * 2.5;
            lineGroup.innerHTML = `<line x1="${pegPoint.x}" y1="${pegPoint.y}" x2="${spotPoint.x}" y2="${spotPoint.y}" stroke="${accentColor}" stroke-width="${baseStroke / scale}" stroke-linecap="round" />`;
        } else {
            lineGroup.innerHTML = '';
        }

        const dotGroup = document.getElementById('dotGroup');
        dotGroup.innerHTML = ''; 
        
        const rMaster = (config.originalWidth / 100) * 0.45;

        if (pegPoint) {
            dotGroup.innerHTML += `<circle cx="${pegPoint.x}" cy="${pegPoint.y}" r="${rMaster}" fill="${pegColor}" stroke="#ffffff" stroke-width="${rMaster * 0.15}" />`;
        }
        if (spotPoint) {
            dotGroup.innerHTML += `<circle cx="${spotPoint.x}" cy="${spotPoint.y}" r="${rMaster}" fill="${spotColor}" stroke="#ffffff" stroke-width="${rMaster * 0.15}" />`;
        }

        applyTransform(); 
    }

    function saveAndCalculate() {
        calculateWraps();
        saveLakeStateValuesOnly();
    }

    function calculateWraps() {
        if (!pegPoint || !spotPoint) {
            clearResultsDisplay();
            return;
        }

        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];
        const rodLength = parseFloat(document.getElementById('rodLength').value);

        const pixelDistance = Math.hypot(spotPoint.x - pegPoint.x, spotPoint.y - pegPoint.y);
        const calculatedMetres = pixelDistance / config.pixelsPerMetre;
        
        const calculatedTotalFeet = calculatedMetres / 0.3048;
        const fullWraps = Math.floor(calculatedTotalFeet / rodLength);
        const remainingFeet = calculatedTotalFeet % rodLength;

        document.getElementById('resultDistance').innerText = `Distance: ${calculatedMetres.toFixed(1)}m (${(calculatedMetres * 1.09361).toFixed(1)}yds)`;

        let outputText = `${fullWraps} wrap${fullWraps !== 1 ? 's' : ''}`;
        if (remainingFeet > 0.05) {
            outputText += ` + ${remainingFeet.toFixed(1)} ft`;
        }
        document.getElementById('resultValue').innerText = outputText;

        if (remainingFeet > 0.05) {
            const shortOfStick = rodLength - remainingFeet;
            document.getElementById('resultNote').innerText = `Target spot is ${calculatedMetres.toFixed(2)}m away.\nOn wrap ${fullWraps + 1}, stop ${shortOfStick.toFixed(1)} ft short of the opposite stick.`;
        } else {
            document.getElementById('resultNote').innerText = `Target spot is ${calculatedMetres.toFixed(2)}m away.\nExactly hit your stick mark on wrap ${fullWraps}.`;
        }
    }

    function saveLakeStateValuesOnly() {
        const activeLakeFile = document.getElementById('lakeSelect').value;
        const stateObject = {
            pegPoint,
            spotPoint,
            scale,
            panX,
            panY,
            rodLength: document.getElementById('rodLength').value
        };
        localStorage.setItem(`hedge_lake_state_${activeLakeFile}`, JSON.stringify(stateObject));
    }

    function loadLakeState() {
        const activeLakeFile = document.getElementById('lakeSelect').value;
        const savedData = localStorage.getItem(`hedge_lake_state_${activeLakeFile}`);
        
        if (savedData) {
            const parsed = JSON.parse(savedData);
            pegPoint = parsed.pegPoint;
            spotPoint = parsed.spotPoint;
            scale = parsed.scale || 1;
            panX = parsed.panX || 0;
            panY = parsed.panY || 0;
            if (parsed.rodLength) {
                document.getElementById('rodLength').value = parsed.rodLength;
            }
        } else {
            pegPoint = null;
            spotPoint = null;
            scale = 1; panX = 0; panY = 0;
        }
        
        syncCanvasGeometry();
        calculateWraps();
    }

    function toggleSafetyLock() {
        isMapLocked = !isMapLocked;
        const lockBtn = document.getElementById('btnLockToggle');
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');

        if (isMapLocked) {
            lockBtn.className = "lock-btn state-locked"; lockBtn.innerHTML = "🔒 MAP LOCKED";
            pegBtn.disabled = true; targetBtn.disabled = true;
            activePlacementMode = 'none';
            resetPlacementState();
            document.getElementById('instructionText').innerText = "Pins are locked. Page scrolling enabled over map area.";
            applyTransform();
        } else {
            lockBtn.className = "lock-btn state-unlocked"; lockBtn.innerHTML = "🔓 MAP UNLOCKED";
            pegBtn.disabled = false; targetBtn.disabled = false;
            resetPlacementState(); 
        }
    }

    function togglePlacementMode(mode) {
        if (isMapLocked) return;
        
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');

        if (activePlacementMode === mode) {
            activePlacementMode = 'none';
            resetPlacementState();
            return;
        }

        activePlacementMode = mode;

        if (mode === 'peg') {
            pegBtn.className = "mode-btn active-peg"; targetBtn.className = "mode-btn";
            text.innerText = "Armed: Placing Peg (Orange). Tap map to place or adjust.";
        } else {
            pegBtn.className = "mode-btn"; targetBtn.className = "mode-btn active-spot";
            text.innerText = "Armed: Placing Target (Red). Tap map to place or adjust.";
        }
    }

    function resetPlacementState() {
        activePlacementMode = 'none';
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');

        pegBtn.className = "mode-btn";
        targetBtn.className = "mode-btn";

        if (isMapLocked) {
            text.innerText = "Pins are locked. Page scrolling enabled over map area.";
        } else {
            text.innerText = "Ready. Arm 'Peg' or 'Spot' buttons above to update locations, or slide to pan/zoom.";
        }
    }

    function handleLakeChange() {
        if (!isMapLocked) toggleSafetyLock();
        loadLakeState(); 
    }

    function clearResultsDisplay() {
        document.getElementById('resultValue').innerText = "0 wraps";
        document.getElementById('resultDistance').innerText = "Distance: --";
        document.getElementById('resultNote').innerText = "Ensure both Peg and Target positions are marked on the map layout.";
    }

    window.addEventListener('resize', () => {
        syncCanvasGeometry();
    });
</script>

</body>
</html>
