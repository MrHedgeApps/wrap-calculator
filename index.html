<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Hedge Wrap Calculator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #4caf50;
            --peg-color: #ff9800;
            --spot-color: #f44336;
            --lock-color: #f44336;
            --unlock-color: #4caf50;
            --text-color: #e0e0e0;
            --text-muted: #999999;
            --input-bg: #262626;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            position: relative;
        }

        h2 {
            margin: 0 0 14px 0;
            text-align: center;
            color: var(--accent-color);
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Nav Tab Switches */
        .nav-container {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .nav-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .nav-btn.active-tab {
            border-color: var(--accent-color);
            background-color: rgba(76, 175, 80, 0.1);
            color: #fff;
        }

        /* Search & Geolocation Row */
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
        }

        .geo-btn, .save-loc-btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .save-loc-btn {
            background-color: rgba(76, 175, 80, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, button.lock-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button.lock-btn {
            border-width: 2px;
            letter-spacing: 0.5px;
        }

        button.lock-btn.state-locked {
            border-color: var(--lock-color);
            color: var(--lock-color);
            background-color: rgba(244, 67, 54, 0.08);
        }

        button.lock-btn.state-unlocked {
            border-color: var(--unlock-color);
            color: var(--unlock-color);
            background-color: rgba(76, 175, 80, 0.08);
        }

        .mode-container {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-muted);
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .mode-btn.active-peg {
            border-color: var(--peg-color);
            background-color: rgba(255, 152, 0, 0.2);
            color: var(--peg-color);
        }

        .mode-btn.active-spot {
            border-color: var(--spot-color);
            background-color: rgba(244, 67, 54, 0.2);
            color: var(--spot-color);
        }

        /* Map Window Container */
        .map-viewport {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: #111111;
            overflow: hidden;
        }

        #satelliteMap {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Saved Locations Overlay Panel */
        .saved-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.92);
            z-index: 10;
            display: none;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .saved-overlay-title {
            font-size: 0.9rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .location-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .location-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .location-item:hover {
            border-color: var(--text-muted);
        }

        .location-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .location-name {
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
        }

        .location-coords {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .delete-loc-btn {
            background: transparent;
            border: none;
            color: var(--spot-color);
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 4px 8px;
        }

        .no-locations-msg {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            font-style: italic;
            margin-top: 20px;
        }

        .result-container {
            padding: 14px;
            background-color: rgba(76, 175, 80, 0.08);
            border: 1px solid var(--accent-color);
            border-radius: 10px;
            text-align: center;
        }

        .result-title {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .result-value { font-size: 1.7rem; font-weight: 800; color: #fff; }
        .result-distance { font-size: 1.1rem; color: #fff; margin-top: 3px; font-weight: 600; }
        .result-note { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; line-height: 1.3; }

        .instructions {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        /* Override Leaflet Marker Styles to keep clean look and minimize collision footprints */
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Hedge Wraps</h2>

        <div class="nav-container">
            <button id="navFindBtn" class="nav-btn active-tab" onclick="switchNavMode('find')">🗺️ Find Location</button>
            <button id="navSavedBtn" class="nav-btn" onclick="switchNavMode('saved')">⭐ Saved Locations</button>
        </div>
        
        <div id="searchControlsRow" class="search-row">
            <div class="search-input-wrapper">
                <input id="searchInput" type="text" class="search-input" placeholder="Search lake, venue, postcode..." onkeydown="if(event.key==='Enter') executeLocationSearch()">
            </div>
            <button class="geo-btn" onclick="fetchDeviceLocation()" title="Find My Location">🛰️ GPS</button>
            <button class="save-loc-btn" onclick="promptSaveCurrentLocation()" title="Save Current View">⭐ Save</button>
        </div>

        <div class="controls-grid">
            <div style="grid-template-columns: 1fr; grid-column: span 2;">
                <label for="rodLength">ROD LENGTH</label>
                <select id="rodLength" onchange="calculateWraps()">
                    <option value="9">9 ft</option>
                    <option value="10">10 ft</option>
                    <option value="11">11 ft</option>
                    <option value="12" selected>12 ft</option>
                    <option value="13">13 ft</option>
                </select>
            </div>
        </div>

        <div class="controls-grid" style="grid-template-columns: 1fr;">
            <div>
                <label>SAFETY LOCK</label>
                <button id="btnLockToggle" class="lock-btn state-locked" onclick="toggleSafetyLock()">🔒 MAP LOCKED</button>
            </div>
        </div>

        <div class="mode-container">
            <button id="btnSetPeg" class="mode-btn" onclick="togglePlacementMode('peg')" disabled>📍 Peg</button>
            <button id="btnSetTarget" class="mode-btn" onclick="togglePlacementMode('spot')" disabled>🎯 Spot</button>
        </div>

        <div class="map-viewport" id="mapViewport">
            <div id="satelliteMap"></div>

            <div id="savedOverlayPanel" class="saved-overlay">
                <div class="saved-overlay-title">Your Saved Venues</div>
                <div id="locationListContainer" class="location-list"></div>
            </div>
        </div>
        
        <div class="instructions" id="instructionText">Map is safety-locked. Unlock above to drop markers.</div>
    </div>

    <div class="card result-container">
        <div class="result-title">Target Geometry</div>
        <div id="resultValue" class="result-value">0 wraps</div>
        <div id="resultDistance" class="result-distance">Distance: --</div>
        <div id="resultNote" class="result-note">Ensure both Peg and Target positions are marked on the map layout.</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
    let map = null;
    let isMapLocked = true; 
    let activePlacementMode = 'none'; 
    
    // Core Geographic Objects
    let pegLatLng = null; 
    let spotLatLng = null;
    let pegMarker = null;
    let spotMarker = null;
    let flightPathLine = null;

    // Navigation and State Cache arrays
    let currentNavMode = 'find'; 
    let savedLocations = [];

    // Initialize components
    initSatelliteMap();
    loadSavedLocationsFromCache();

    function initSatelliteMap() {
        // Fallback view safely centered on Dunstable context area
        const defaultLat = 51.884;
        const defaultLng = -0.520;
        
        map = L.map('satelliteMap', {
            center: [defaultLat, defaultLng],
            zoom: 16,
            zoomControl: false,
            attributionControl: false
        });

        // Pull pristine Esri World Imagery Satellite Tiles directly
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            maxNativeZoom: 19
        }).addTo(map);

        // Map Click Entry Hook
        map.on('click', (e) => {
            if (isMapLocked || activePlacementMode === 'none') return;
            handleMapInteraction(e.latlng);
        });

        // Initialize UI lock rules
        lockMapInteractions();
    }

    function lockMapInteractions() {
        map.dragging.disable();
        map.touchZoom.disable();
        map.doubleClickZoom.disable();
        map.scrollWheelZoom.disable();
        map.boxZoom.disable();
        map.keyboard.disable();
        if (map.tap) map.tap.disable();
    }

    function unlockMapInteractions() {
        map.dragging.enable();
        map.touchZoom.enable();
        map.doubleClickZoom.enable();
        map.scrollWheelZoom.enable();
        map.boxZoom.enable();
        map.keyboard.enable();
        if (map.tap) map.tap.enable();
    }

    function switchNavMode(targetMode) {
        currentNavMode = targetMode;
        const findBtn = document.getElementById('navFindBtn');
        const savedBtn = document.getElementById('navSavedBtn');
        const overlay = document.getElementById('savedOverlayPanel');

        if (targetMode === 'find') {
            findBtn.className = "nav-btn active-tab";
            savedBtn.className = "nav-btn";
            overlay.style.display = 'none';
        } else {
            findBtn.className = "nav-btn";
            savedBtn.className = "nav-btn active-tab";
            overlay.style.display = 'flex';
            
            // Force safe lock transition when switching windows to prevent background map shifts
            if (!isMapLocked) toggleSafetyLock();
            renderSavedLocationItems();
        }
    }

    function handleMapInteraction(latlng) {
        if (activePlacementMode === 'peg') {
            pegLatLng = latlng;
        } else if (activePlacementMode === 'spot') {
            spotLatLng = latlng;
        }

        renderMapGraphicsLayers();
        calculateWraps();
        resetPlacementState();
    }

    function renderMapGraphicsLayers() {
        const pegColor = getComputedStyle(document.documentElement).getPropertyValue('--peg-color').trim();
        const spotColor = getComputedStyle(document.documentElement).getPropertyValue('--spot-color').trim();
        const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();

        // Clear existing vector components safely
        if (pegMarker) map.removeLayer(pegMarker);
        if (spotMarker) map.removeLayer(spotMarker);
        if (flightPathLine) map.removeLayer(flightPathLine);

        // Render Peg Element via clean dynamic inline HTML icons
        if (pegLatLng) {
            const pegHtml = `<div style="background-color: ${pegColor}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 6px rgba(0,0,0,0.8);"></div>`;
            pegMarker = L.marker(pegLatLng, {
                icon: L.divIcon({ html: pegHtml, iconSize: [12, 12], iconAnchor: [6, 6] })
            }).addTo(map);
        }

        // Render Spot Element
        if (spotLatLng) {
            const spotHtml = `<div style="background-color: ${spotColor}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 6px rgba(0,0,0,0.8);"></div>`;
            spotMarker = L.marker(spotLatLng, {
                icon: L.divIcon({ html: spotHtml, iconSize: [12, 12], iconAnchor: [6, 6] })
            }).addTo(map);
        }

        // Render Connection Vector Line Rule
        if (pegLatLng && spotLatLng) {
            flightPathLine = L.polyline([pegLatLng, spotLatLng], {
                color: accentColor,
                weight: 3,
                opacity: 0.9,
                lineCap: 'round'
            }).addTo(map);
        }
    }

    function calculateWraps() {
        if (!pegLatLng || !spotLatLng) return;

        const rodLength = parseFloat(document.getElementById('rodLength').value);

        // Haversine Precise Formula Computation Path
        const R = 6371000; // Earth radius rule in metres
        const dLat = (spotLatLng.lat - pegLatLng.lat) * Math.PI / 180;
        const dLon = (spotLatLng.lng - pegLatLng.lng) * Math.PI / 180;
        
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(pegLatLng.lat * Math.PI / 180) * Math.cos(spotLatLng.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                  
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const calculatedMetres = R * c; // Absolute horizontal distance line

        const calculatedTotalFeet = calculatedMetres / 0.3048;
        const fullWraps = Math.floor(calculatedTotalFeet / rodLength);
        const remainingFeet = calculatedTotalFeet % rodLength;

        document.getElementById('resultDistance').innerText = `Distance: ${calculatedMetres.toFixed(1)}m (${(calculatedMetres * 1.09361).toFixed(1)}yds)`;

        let outputText = `${fullWraps} wrap${fullWraps !== 1 ? 's' : ''}`;
        if (remainingFeet > 0.05) {
            outputText += ` + ${remainingFeet.toFixed(1)} ft`;
        }
        document.getElementById('resultValue').innerText = outputText;

        if (remainingFeet > 0.05) {
            const shortOfStick = rodLength - remainingFeet;
            document.getElementById('resultNote').innerText = `Target spot is ${calculatedMetres.toFixed(2)}m away.\nOn wrap ${fullWraps + 1}, stop ${shortOfStick.toFixed(1)} ft short of the opposite stick.`;
        } else {
            document.getElementById('resultNote').innerText = `Target spot is ${calculatedMetres.toFixed(2)}m away.\nExactly hit your stick mark on wrap ${fullWraps}.`;
        }
    }

    function fetchDeviceLocation() {
        if (!navigator.geolocation) {
            alert("Geolocation services are not supported by this browser client.");
            return;
        }

        document.getElementById('instructionText').innerText = "🛰️ Querying system satellite arrays...";
        
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                map.setView([lat, lng], 18);
                document.getElementById('instructionText').innerText = "Location locked via GPS array telemetry.";
                setTimeout(resetPlacementState, 2000);
            },
            (error) => {
                alert("GPS connection failed: " + error.message);
                resetPlacementState();
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    async function executeLocationSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;

        document.getElementById('instructionText').innerText = "Searching global index logs...";

        try {
            // Safe fallback open OSM Geocoding lookup configuration
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
            const data = await response.json();

            if (data && data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                map.setView([lat, lon], 17);
                document.getElementById('instructionText').innerText = `Moved layout directly onto coordinate vector targets.`;
                setTimeout(resetPlacementState, 2000);
            } else {
                alert("No coordinate points matching location name found.");
                resetPlacementState();
            }
        } catch (err) {
            alert("Index server communication failure.");
            resetPlacementState();
        }
    }

    function promptSaveCurrentLocation() {
        const currentCenter = map.getCenter();
        const currentZoom = map.getZoom();
        
        const locationName = prompt("Enter a memorable tag name for this venue position:");
        if (!locationName || !locationName.trim()) return;

        const record = {
            id: 'loc_' + Date.now(),
            name: locationName.trim(),
            lat: currentCenter.lat,
            lng: currentCenter.lng,
            zoom: currentZoom,
            pegLatLng: pegLatLng,
            spotLatLng: spotLatLng
        };

        savedLocations.push(record);
        localStorage.setItem('hedge_saved_maps_cache', JSON.stringify(savedLocations));
        alert("Venue profile cached safely into storage matrices.");
    }

    function loadSavedLocationsFromCache() {
        const cached = localStorage.getItem('hedge_saved_maps_cache');
        if (cached) {
            try {
                savedLocations = JSON.parse(cached);
            } catch(e) {
                savedLocations = [];
            }
        }
    }

    function renderSavedLocationItems() {
        const container = document.getElementById('locationListContainer');
        container.innerHTML = '';

        if (savedLocations.length === 0) {
            container.innerHTML = '<div class="no-locations-msg">No custom coordinate records saved yet. Navigate onto a venue and hit Save.</div>';
            return;
        }

        savedLocations.forEach(loc => {
            const row = document.createElement('div');
            row.className = 'location-item';
            row.onclick = () => selectAndFlyToSavedLocation(loc.id);

            row.innerHTML = `
                <div class="location-info">
                    <div class="location-name">${loc.name}</div>
                    <div class="location-coords">Lat: ${loc.lat.toFixed(4)}, Lng: ${loc.lng.toFixed(4)}</div>
                </div>
                <button class="delete-loc-btn" onclick="event.stopPropagation(); deleteSavedLocationItem('${loc.id}')" title="Delete Location">✕</button>
            `;
            container.appendChild(row);
        });
    }

    function selectAndFlyToSavedLocation(locationId) {
        const loc = savedLocations.find(l => l.id === locationId);
        if (!loc) return;

        // Restore venue viewport map perspective configuration
        map.setView([loc.lat, loc.lng], loc.zoom || 17);

        // Restore markers if they existed for this venue instance
        pegLatLng = loc.pegLatLng ? L.latLng(loc.pegLatLng.lat, loc.pegLatLng.lng) : null;
        spotLatLng = loc.spotLatLng ? L.latLng(loc.spotLatLng.lat, loc.spotLatLng.lng) : null;

        renderMapGraphicsLayers();
        calculateWraps();
        switchNavMode('find');
    }

    function deleteSavedLocationItem(locationId) {
        if (!confirm("Are you certain you wish to delete this saved location record?")) return;
        savedLocations = savedLocations.filter(l => l.id !== locationId);
        localStorage.setItem('hedge_saved_maps_cache', JSON.stringify(savedLocations));
        renderSavedLocationItems();
    }

    function toggleSafetyLock() {
        isMapLocked = !isMapLocked;
        const lockBtn = document.getElementById('btnLockToggle');
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');

        if (isMapLocked) {
            lockBtn.className = "lock-btn state-locked"; lockBtn.innerHTML = "🔒 MAP LOCKED";
            pegBtn.disabled = true; targetBtn.disabled = true;
            activePlacementMode = 'none';
            resetPlacementState();
            lockMapInteractions();
        } else {
            lockBtn.className = "lock-btn state-unlocked"; lockBtn.innerHTML = "🔓 MAP UNLOCKED";
            pegBtn.disabled = false; targetBtn.disabled = false;
            resetPlacementState(); 
            unlockMapInteractions();
        }
    }

    function togglePlacementMode(mode) {
        if (isMapLocked) return;
        
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');

        if (activePlacementMode === mode) {
            activePlacementMode = 'none';
            resetPlacementState();
            return;
        }

        activePlacementMode = mode;

        if (mode === 'peg') {
            pegBtn.className = "mode-btn active-peg"; targetBtn.className = "mode-btn";
            text.innerText = "Armed: Placing Peg (Orange). Tap satellite to mark your swim.";
        } else {
            pegBtn.className = "mode-btn"; targetBtn.className = "mode-btn active-spot";
            text.innerText = "Armed: Placing Target (Red). Tap satellite to mark your spot.";
        }
    }

    function resetPlacementState() {
        activePlacementMode = 'none';
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');

        pegBtn.className = "mode-btn";
        targetBtn.className = "mode-btn";

        if (isMapLocked) {
            text.innerText = "Pins are locked. Page scrolling enabled over map area.";
        } else {
            text.innerText = "Ready. Arm 'Peg' or 'Spot' buttons above to update locations, or slide to pan/zoom.";
        }
    }

    function clearResultsDisplay() {
        document.getElementById('resultValue').innerText = "0 wraps";
        document.getElementById('resultDistance').innerText = "Distance: --";
        document.getElementById('resultNote').innerText = "Ensure both Peg and Target positions are marked on the map layout.";
    }
</script>

</body>
</html>
