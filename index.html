<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Hedge Wrap Calculator: PRECISION</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #4caf50;
            --peg-color: #ff9800;
            --spot-color: #f44336;
            --lock-color: #f44336;
            --unlock-color: #4caf50;
            --text-color: #e0e0e0;
            --text-muted: #999999;
            --input-bg: #262626;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin: 0 0 14px 0;
            text-align: center;
            color: var(--accent-color);
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, button.lock-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button.lock-btn {
            border-width: 2px;
            letter-spacing: 0.5px;
        }

        button.lock-btn.state-locked {
            border-color: var(--lock-color);
            color: var(--lock-color);
            background-color: rgba(244, 67, 54, 0.08);
        }

        button.lock-btn.state-unlocked {
            border-color: var(--unlock-color);
            color: var(--unlock-color);
            background-color: rgba(76, 175, 80, 0.08);
        }

        .mode-container {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-muted);
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .mode-btn.active-peg {
            border-color: var(--peg-color);
            background-color: rgba(255, 152, 0, 0.2);
            color: var(--peg-color);
        }

        .mode-btn.active-spot {
            border-color: var(--spot-color);
            background-color: rgba(244, 67, 54, 0.2);
            color: var(--spot-color);
        }

        /* Map Canvas */
        .map-viewport {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: #111111;
            touch-action: none;
        }

        /* Content layer for transforms */
        .zoom-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .zoom-content:active { cursor: grabbing; }

        .map-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-select: none;
        }

        /* Hyper-Precision SVG Drawing Layer */
        #mapSvg {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            /* SVG will be matched exactly to the rendered image bounds by JS */
        }

        /* Reporting Section */
        .result-container {
            padding: 14px;
            background-color: rgba(76, 175, 80, 0.08);
            border: 1px solid var(--accent-color);
            border-radius: 10px;
            text-align: center;
        }

        .result-title {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .result-value { font-size: 1.7rem; font-weight: 800; color: #fff; }
        .result-distance { font-size: 1.1rem; color: #fff; margin-top: 3px; font-weight: 600; }
        .result-note { font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; line-height: 1.3; }

        .instructions {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }

        .precision-tip {
            font-size: 0.7rem;
            color: var(--accent-color);
            text-align: center;
            margin-top: 5px;
            opacity: 0.7;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Hedge Wraps</h2>
        
        <div class="controls-grid">
            <div>
                <label for="lakeSelect">CHOOSE LAKE</label>
                <select id="lakeSelect" onchange="handleLakeChange()">
                    <option value="Astral.png">Astral Park Lake</option>
                    <option value="Lake2.png">Lake 2 (Pending)</option>
                    <option value="Lake3.png">Lake 3 (Pending)</option>
                </select>
            </div>
            <div>
                <label for="rodLength">ROD LENGTH</label>
                <select id="rodLength" onchange="calculateWraps()">
                    <option value="9">9 ft</option>
                    <option value="10">10 ft</option>
                    <option value="11">11 ft</option>
                    <option value="12" selected>12 ft</option>
                    <option value="13">13 ft</option>
                </select>
            </div>
        </div>

        <div class="controls-grid" style="grid-template-columns: 1fr;">
            <div>
                <label>SAFETY LOCK</label>
                <button id="btnLockToggle" class="lock-btn state-locked" onclick="toggleSafetyLock()">🔒 MAP LOCKED</button>
            </div>
        </div>

        <div class="mode-container">
            <button id="btnSetPeg" class="mode-btn" onclick="setPlacementMode('peg')" disabled>📍 Peg</button>
            <button id="btnSetTarget" class="mode-btn" onclick="setPlacementMode('spot')" disabled>🎯 Spot</button>
        </div>

        <div class="map-viewport" id="mapViewport">
            <div class="zoom-content" id="zoomContent">
                <svg id="mapSvg" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <pattern id="lakePattern" patternUnits="userSpaceOnUse" width="100%" height="100%">
                            <image id="svgImageElement" href="Astral.png" x="0" y="0" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" />
                        </pattern>
                    </defs>
                    <rect id="mapRect" width="100%" height="100%" fill="url(#lakePattern)" />
                    
                    <g id="lineGroup"></g>
                    <g id="dotGroup"></g>
                </svg>
            </div>
        </div>
        
        <div class="precision-tip">💡 Markers are precision calibrated to $\approx 1\text{m} \times 1\text{m}$ at max zoom.</div>
        <div class="instructions" id="instructionText">Map is safety-locked. Unlock above to drop markers.</div>
    </div>

    <div class="card result-container">
        <div class="result-title">Target Geometry</div>
        <div id="resultValue" class="result-value">0 wraps</div>
        <div id="resultDistance" class="result-distance">Distance: --</div>
        <div id="resultNote" class="result-note">Ensure both Peg and Target positions are marked on the map layout.</div>
    </div>
</div>

<script>
    // System Core States
    let isMapLocked = true; 
    let activePlacementMode = 'none'; 
    let pegPoint = null; 
    let spotPoint = null;

    // Pan & Zoom Matrix
    let scale = 1; let panX = 0; let panY = 0;
    let isDragging = false; let startX, startY; let initialPinchDist = null;

    const viewport = document.getElementById('mapViewport');
    const content = document.getElementById('zoomContent');
    const svgCanvas = document.getElementById('mapSvg');

    // Precision Topographic Calibration Rules (Fixed Data)
    const LAKE_CONFIGS = {
        "Astral.png": { 
            originalWidth: 960,  // Natural px width of file
            originalHeight: 816, // Natural px height of file
            scaleLinePixels: 262, // Length of Google Earth 200m line
            scaleRealMetres: 200,
            
            // Percentage-based marker radius: 
            // set to 0.05% of Astral's width creates a ~1m circle on water
            precisionMarkerPercent: 0.05
        },
        "Lake2.png": { originalWidth: 1000, originalHeight: 1000, scaleLinePixels: 500, scaleRealMetres: 100, precisionMarkerPercent: 0.1 },
        "Lake3.png": { originalWidth: 1000, originalHeight: 1000, scaleLinePixels: 500, scaleRealMetres: 100, precisionMarkerPercent: 0.1 }
    };

    // Initialize System
    setupPanZoomEvents();
    syncSvgToImageGeometry();

    function setupPanZoomEvents() {
        viewport.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX - panX; startY = e.clientY - panY;
        });
        viewport.addEventListener('pointermove', onPointerMove);
        viewport.addEventListener('pointerup', onPointerUp);
        viewport.addEventListener('pointercancel', onPointerUp);
        viewport.addEventListener('wheel', onWheel, { passive: false });

        viewport.addEventListener('touchstart', onTouchStart, { passive: true });
        viewport.addEventListener('touchmove', onTouchMove, { passive: false });
        viewport.addEventListener('touchend', onTouchEnd);
    }

    function onPointerMove(e) {
        if (!isDragging) return;
        if (e.pointerType === 'touch' && initialPinchDist !== null) return;
        
        panX = e.clientX - startX;
        panY = e.clientY - startY;
        applyTransform();
    }

    function onPointerUp(e) {
        if (!isDragging) return;
        isDragging = false;

        const deltaX = Math.abs(e.clientX - (startX + panX));
        const deltaY = Math.abs(e.clientY - (startY + panY));
        // If it's a precise click (not a drag-pan operation), place a marker
        if (deltaX < 5 && deltaY < 5) {
            handleMapTap(e);
        }
    }

    function onWheel(e) {
        e.preventDefault();
        const zoomFactor = 1.1;
        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        // Anchor zooming point to mouse location
        const contentX = (mouseX - panX) / scale;
        const contentY = (mouseY - panY) / scale;

        if (e.deltaY < 0) {
            scale = Math.min(scale * zoomFactor, 6); // MAX ZOOM 6x
        } else {
            scale = Math.max(scale / zoomFactor, 1); // MIN ZOOM 1x
        }

        panX = mouseX - contentX * scale;
        panY = mouseY - contentY * scale;
        
        applyTransform();
    }

    // Touch Mobile Pinch Engine
    function onTouchStart(e) {
        if (e.touches.length === 2) {
            initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }
    function onTouchMove(e) {
        if (e.touches.length === 2 && initialPinchDist !== null) {
            e.preventDefault();
            const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            
            const rect = viewport.getBoundingClientRect();
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;

            const contentX = (midX - panX) / scale;
            const contentY = (midY - panY) / scale;

            const zoomRatio = currentDist / initialPinchDist;
            scale = Math.max(1, Math.min(scale * zoomRatio, 6));

            panX = midX - contentX * scale;
            panY = midY - contentY * scale;

            initialPinchDist = currentDist;
            applyTransform();
        }
    }
    function onTouchEnd() { initialPinchDist = null; }

    function applyTransform() {
        // Constrain bounds
        const maxPanX = viewport.clientWidth * (scale - 1);
        const maxPanY = viewport.clientHeight * (scale - 1);
        
        if (panX > 0) panX = 0; if (panY > 0) panY = 0;
        if (panX < -maxPanX) panX = -maxPanX; if (panY < -maxPanY) panY = -maxPanY;

        content.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        
        // --- Hyper-Precision Visual Logic ---
        // Markers are embedded SVG circles; their size is fixed by percentage relative 
        // to the *image's underlying natural width*. As you zoom, they expand perfectly.
        // We only need to adjust the stroke width of the connecting dash line so it
        // stays clear and thin at max zoom.
        const connectingLine = document.querySelector('#lineGroup line');
        if (connectingLine) {
            connectingLine.setAttribute('stroke-width', Math.max(0.5, 2.5 / scale));
            connectingLine.setAttribute('stroke-dasharray', `${4/scale},${4/scale}`);
        }
    }

    function handleMapTap(e) {
        // Safety guard checks
        if (isMapLocked || activePlacementMode === 'none' || initialPinchDist !== null) return;

        // Use the SVG canvas itself as the coordinate master
        const rect = svgCanvas.getBoundingClientRect();
        
        // Calculate coordinates relative to the underlying geometry, bypassing pan/zoom matrix
        const clickXPercentage = (e.clientX - rect.left) / rect.width;
        const clickYPercentage = (e.clientY - rect.top) / rect.height;

        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];

        if (activePlacementMode === 'peg') {
            pegPoint = { x: clickXPercentage, y: clickYPercentage };
        } else {
            spotPoint = { x: clickXPercentage, y: clickYPercentage };
        }

        // Standardize data geometry view
        syncSvgToImageGeometry(); 
        calculateWraps();
    }

    function syncSvgToImageGeometry() {
        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];
        const text = document.getElementById('lakePattern');
        
        // Read active visual dimensions of content container
        const cWidth = content.clientWidth;
        const cHeight = content.clientHeight;

        // Find the precise dimension limits of the rendered image within the container (contain logic)
        const imageRatio = config.originalWidth / config.originalHeight;
        const containerRatio = cWidth / cHeight;
        
        let imgRenderW, imgRenderH, imgOffsetTop, imgOffsetLeft;

        if (containerRatio > imageRatio) {
            // Container is wider than the map image (tall image fit)
            imgRenderH = cHeight;
            imgRenderW = cHeight * imageRatio;
            imgOffsetTop = 0;
            imgOffsetLeft = (cWidth - imgRenderW) / 2;
        } else {
            // Map image is wider than container (wide image fit - most mobile screens)
            imgRenderW = cWidth;
            imgRenderH = cWidth / imageRatio;
            imgOffsetLeft = 0;
            imgOffsetTop = (cHeight - imgRenderH) / 2;
        }

        // Lock the SVG Viewbox precisely to the underlying image's natural geometry (percentages)
        svgCanvas.style.top = imgOffsetTop + 'px';
        svgCanvas.style.left = imgOffsetLeft + 'px';
        svgCanvas.style.width = imgRenderW + 'px';
        svgCanvas.style.height = imgRenderH + 'px';
        svgCanvas.setAttribute('viewBox', '0 0 100 100'); // Clean percentage viewBox master

        // Reset embedded image pattern bounds
        document.getElementById('svgImageElement').setAttribute('href', activeLakeFile);

        // --- DRAWING THE Hyper-Precise Topography ---
        const pegColor = getComputedStyle(document.documentElement).getPropertyValue('--peg-color').trim();
        const spotColor = getComputedStyle(document.documentElement).getPropertyValue('--spot-color').trim();
        const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();

        // 1. Draw Connecting Line (with scaling dash width logic)
        const lineGroup = document.getElementById('lineGroup');
        if (pegPoint && spotPoint) {
            lineGroup.innerHTML = `<line x1="${pegPoint.x * 100}" y1="${pegPoint.y * 100}" x2="${spotPoint.x * 100}" y2="${spotPoint.y * 100}" stroke="${accentColor}" stroke-width="2" stroke-linecap="round" />`;
        } else {
            lineGroup.innerHTML = '';
        }

        // 2. Draw Embedded precision dots (percentage-based radii)
        const dotGroup = document.getElementById('dotGroup');
        dotGroup.innerHTML = ''; // Clean canvas
        
        // rMaster is the precision constant percentage based on the config
        const rMaster = config.precisionMarkerPercent; 

        if (pegPoint) {
            dotGroup.innerHTML += `<circle cx="${pegPoint.x * 100}" cy="${pegPoint.y * 100}" r="${rMaster * 2}" fill="${pegColor}" stroke="#ffffff" stroke-width="0.3" />`;
        }
        if (spotPoint) {
            dotGroup.innerHTML += `<circle cx="${spotPoint.x * 100}" cy="${spotPoint.y * 100}" r="${rMaster * 2}" fill="${spotColor}" stroke="#ffffff" stroke-width="0.3" />`;
        }

        // Force scale visual logic alignment
        applyTransform(); 
    }

    function calculateWraps() {
        if (!pegPoint || !spotPoint) return;

        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];
        const rodLength = parseFloat(document.getElementById('rodLength').value);

        // Turn coordinates into percentage distance Master formula
        const dxPercent = (spotPoint.x - pegPoint.x) * 100;
        const dyPercent = (spotPoint.y - pegPoint.y) * 100;
        const distancePercentageOfWidth = Math.sqrt(Math.pow(dxPercent, 2) + Math.pow(dyPercent, 2));

        // Geometric Master Math Rules: 
        // 1. Convert percentage distance of natural image into pixels
        const pixelDistanceOnNaturalImage = (distancePercentageOfWidth / 100) * config.originalWidth;
        
        // 2. Use the Lake's master scale rule (ScalePixels / ScaleRealMetres)
        const pixelsPerMetreMasterRule = config.scaleLinePixels / config.scaleRealMetres;
        
        // 3. Final conversion to real-world metric
        const calculatedMetres = pixelDistanceOnNaturalImage / pixelsPerMetreMasterRule;
        
        // Standard non-metric warp breakdown logic follows
        const calculatedTotalFeet = calculatedMetres / 0.3048;
        const fullWraps = Math.floor(calculatedTotalFeet / rodLength);
        const remainingFeet = calculatedTotalFeet % rodLength;

        // Output results update
        document.getElementById('resultDistance').innerText = `Distance: ${calculatedMetres.toFixed(1)}m (${(calculatedMetres * 1.09361).toFixed(1)}yds)`;

        let outputText = `${fullWraps} wrap${fullWraps !== 1 ? 's' : ''}`;
        if (remainingFeet > 0.05) {
            outputText += ` + ${remainingFeet.toFixed(1)} ft`;
        }
        document.getElementById('resultValue').innerText = outputText;

        if (remainingFeet > 0.05) {
            const shortOfStick = rodLength - remainingFeet;
            document.getElementById('resultNote').innerText = `Target spot is ${calculatedMetres.toFixed(2)}m away.\nOn wrap ${fullWraps + 1}, stop ${shortOfStick.toFixed(1)} ft short of the opposite stick.`;
        } else {
            document.getElementById('resultNote').innerText = `Target spot is ${calculatedMetres.toFixed(2)}m away.\nExactly hit your stick mark on wrap ${fullWraps}.`;
        }
    }

    // --- Core safety lock / view management functions ---
    function toggleSafetyLock() {
        isMapLocked = !isMapLocked;
        const lockBtn = document.getElementById('btnLockToggle');
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');

        if (isMapLocked) {
            lockBtn.className = "lock-btn state-locked"; lockBtn.innerHTML = "🔒 MAP LOCKED";
            pegBtn.disabled = true; targetBtn.disabled = true;
            pegBtn.className = "mode-btn"; targetBtn.className = "mode-btn";
            activePlacementMode = 'none';
            text.innerText = "Map is safety-locked. Unlock above to drop markers.";
        } else {
            lockBtn.className = "lock-btn state-unlocked"; lockBtn.innerHTML = "🔓 MAP UNLOCKED";
            pegBtn.disabled = false; targetBtn.disabled = false;
            // Default active state
            setPlacementMode('peg'); 
        }
    }
    function setPlacementMode(mode) {
        if (isMapLocked) return;
        activePlacementMode = mode;
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');
        if (mode === 'peg') {
            pegBtn.className = "mode-btn active-peg"; targetBtn.className = "mode-btn";
            text.innerText = "Mode: Placing Peg (Orange). Tap to move swim position.";
        } else {
            pegBtn.className = "mode-btn"; targetBtn.className = "mode-btn active-spot";
            text.innerText = "Mode: Placing Target (Red). Tap to adjust target fishing spot.";
        }
    }
    function handleLakeChange() {
        // Reset transformation view matrix
        scale = 1; panX = 0; panY = 0; applyTransform();
        // Force safety lockdown on venue change
        if (!isMapLocked) toggleSafetyLock();
        resetMarkers(); // Geometry data re-sync handles the image update
    }
    function resetMarkers() {
        pegPoint = null; spotPoint = null;
        document.getElementById('resultValue').innerText = "0 wraps";
        document.getElementById('resultDistance').innerText = "Distance: --";
        document.getElementById('resultNote').innerText = "Target distance reporting.";
        syncSvgToImageGeometry(); // Master geometry wipe
    }

    window.addEventListener('resize', () => {
        syncSvgToImageGeometry();
    });
</script>

</body>
</html>
