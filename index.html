<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedge Wrap Calculator & Maps</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #4caf50;
            --peg-color: #ff9800;
            --spot-color: #f44336;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --input-bg: #2d2d2d;
            --border-color: #3d3d3d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--accent-color);
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        /* Mode Buttons Styling */
        .mode-container {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-btn:active {
            transform: scale(0.98);
        }

        .mode-btn.active-peg {
            border-color: var(--peg-color);
            background-color: rgba(255, 152, 0, 0.15);
            color: var(--peg-color);
        }

        .mode-btn.active-spot {
            border-color: var(--spot-color);
            background-color: rgba(244, 67, 54, 0.15);
            color: var(--spot-color);
        }

        /* Map Canvas */
        .map-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            line-height: 0;
            cursor: crosshair;
            user-select: none;
            -webkit-user-select: none;
            background: #181818;
        }

        .map-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .pin {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 10;
            border: 2px solid #fff;
            transition: left 0.1s ease, top 0.1s ease;
        }

        .pin.peg { background-color: var(--peg-color); } 
        .pin.spot { background-color: var(--spot-color); } 

        #mapSvg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Results Display */
        .result-container {
            padding: 14px;
            background-color: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            text-align: center;
        }

        .result-title {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .result-value {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .result-distance {
            font-size: 1rem;
            color: var(--text-color);
            margin-top: 2px;
            font-weight: 500;
        }

        .result-note {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .instructions {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Hedge Wrap Calculator</h2>
        
        <div class="controls-grid">
            <div>
                <label for="lakeSelect">CHOOSE LAKE</label>
                <select id="lakeSelect" onchange="handleLakeChange()">
                    <option value="Astral.png">Astral Park Lake</option>
                    <option value="Lake2.png">Lake 2 (Pending)</option>
                    <option value="Lake3.png">Lake 3 (Pending)</option>
                </select>
            </div>
            <div>
                <label for="rodLength">ROD LENGTH</label>
                <select id="rodLength" onchange="calculateWraps()">
                    <option value="9">9 ft</option>
                    <option value="10">10 ft</option>
                    <option value="11">11 ft</option>
                    <option value="12" selected>12 ft</option>
                    <option value="13">13 ft</option>
                </select>
            </div>
        </div>

        <div class="mode-container">
            <button id="btnSetPeg" class="mode-btn active-peg" onclick="setPlacementMode('peg')">📍 Set Peg</button>
            <button id="btnSetTarget" class="mode-btn" onclick="setPlacementMode('spot')">🎯 Set Target</button>
        </div>

        <div class="map-wrapper" id="mapWrapper" onclick="handleMapClick(event)">
            <img src="Astral.png" alt="Lake Depth Map" class="map-image" id="lakeMap">
            <svg id="mapSvg"></svg>
            <div id="pegPin" class="pin peg" style="display: none;"></div>
            <div id="spotPin" class="pin spot" style="display: none;"></div>
        </div>
        
        <div class="instructions" id="instructionText">Mode: Setting Peg. Tap the map to drop your swim location.</div>
    </div>

    <div class="card result-container">
        <div class="result-title">Target Calculation</div>
        <div id="resultValue" class="result-value">0 wraps</div>
        <div id="resultDistance" class="result-distance">Distance: --</div>
        <div id="resultNote" class="result-note">Ensure both Peg and Target positions are marked on the map layout.</div>
    </div>
</div>

<script>
    let activePlacementMode = 'peg'; // Tracks which pin our map-tap mutates
    let pegPoint = null;
    let spotPoint = null;

    // Geographic calibration scale map rules
    const LAKE_CONFIGS = {
        "Astral.png": {
            scaleRatio: 262 / 960, 
            scaleRealMetres: 200
        },
        "Lake2.png": {
            scaleRatio: 1.0, 
            scaleRealMetres: 100
        },
        "Lake3.png": {
            scaleRatio: 1.0, 
            scaleRealMetres: 100
        }
    };

    function setPlacementMode(mode) {
        activePlacementMode = mode;
        const pegBtn = document.getElementById('btnSetPeg');
        const targetBtn = document.getElementById('btnSetTarget');
        const text = document.getElementById('instructionText');

        if (mode === 'peg') {
            pegBtn.className = "mode-btn active-peg";
            targetBtn.className = "mode-btn";
            text.innerText = "Mode: Setting Peg. Tap the map to drop or move your swim position.";
        } else {
            pegBtn.className = "mode-btn";
            targetBtn.className = "mode-btn active-spot";
            text.innerText = "Mode: Setting Target. Tap the map to drop or adjust your target fishing spot.";
        }
    }

    function handleLakeChange() {
        const select = document.getElementById('lakeSelect');
        document.getElementById('lakeMap').src = select.value;
        resetMarkers();
    }

    function handleMapClick(event) {
        const bounds = event.currentTarget.getBoundingClientRect();
        const x = (event.clientX - bounds.left) / bounds.width;
        const y = (event.clientY - bounds.top) / bounds.height;

        if (activePlacementMode === 'peg') {
            pegPoint = { x, y };
            const pin = document.getElementById('pegPin');
            pin.style.left = (x * 100) + '%';
            pin.style.top = (y * 100) + '%';
            pin.style.display = 'block';
        } else {
            spotPoint = { x, y };
            const pin = document.getElementById('spotPin');
            pin.style.left = (x * 100) + '%';
            pin.style.top = (y * 100) + '%';
            pin.style.display = 'block';
        }

        // Instantly sync layout graphics and map math rules
        drawConnectingLine();
        calculateWraps();
    }

    function drawConnectingLine() {
        const svg = document.getElementById('mapSvg');
        if (!pegPoint || !spotPoint) {
            svg.innerHTML = '';
            return;
        }
        svg.innerHTML = `
            <line x1="${pegPoint.x * 100}%" y1="${pegPoint.y * 100}%" 
                  x2="${spotPoint.x * 100}%" y2="${spotPoint.y * 100}%" 
                  stroke="#4caf50" stroke-width="2.5" stroke-dasharray="5,5" />
        `;
    }

    function clearResults() {
        document.getElementById('resultValue').innerText = "0 wraps";
        document.getElementById('resultDistance').innerText = "Distance: --";
        document.getElementById('resultNote').innerText = "Ensure both Peg and Target positions are marked on the map layout.";
    }

    function resetMarkers() {
        pegPoint = null;
        spotPoint = null;
        document.getElementById('pegPin').style.display = 'none';
        document.getElementById('spotPin').style.display = 'none';
        document.getElementById('mapSvg').innerHTML = '';
        setPlacementMode('peg');
        clearResults();
    }

    function calculateWraps() {
        if (!pegPoint || !spotPoint) return;

        const activeLakeFile = document.getElementById('lakeSelect').value;
        const config = LAKE_CONFIGS[activeLakeFile];
        const mapImage = document.getElementById('lakeMap');

        const currentWidth = mapImage.clientWidth;
        const currentHeight = mapImage.clientHeight;

        const x1 = pegPoint.x * currentWidth;
        const y1 = pegPoint.y * currentHeight;
        const x2 = spotPoint.x * currentWidth;
        const y2 = spotPoint.y * currentHeight;

        const pixelDistance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        const scaleBarPixels = currentWidth * config.scaleRatio;
        
        const calculatedMetres = (pixelDistance / scaleBarPixels) * config.scaleRealMetres;
        const calculatedTotalFeet = calculatedMetres / 0.3048;

        const rodLength = parseFloat(document.getElementById('rodLength').value);
        const fullWraps = Math.floor(calculatedTotalFeet / rodLength);
        const remainingFeet = calculatedTotalFeet % rodLength;

        document.getElementById('resultDistance').innerText = `Distance: ${calculatedMetres.toFixed(1)}m (${(calculatedMetres * 1.09361).toFixed(1)}yds)`;

        let outputText = `${fullWraps} wrap${fullWraps !== 1 ? 's' : ''}`;
        if (remainingFeet > 0.05) {
            outputText += ` + ${remainingFeet.toFixed(1)} ft`;
        }
        document.getElementById('resultValue').innerText = outputText;

        if (remainingFeet > 0.05) {
            const shortOfStick = rodLength - remainingFeet;
            document.getElementById('resultNote').innerText = `On wrap ${fullWraps + 1}, stop ${shortOfStick.toFixed(1)} ft short of the opposite stick.`;
        } else {
            document.getElementById('resultNote').innerText = `Perfect configuration. Match the stick target exactly on wrap ${fullWraps}.`;
        }
    }

    window.addEventListener('resize', () => {
        if (pegPoint && spotPoint) {
            drawConnectingLine();
            calculateWraps();
        }
    });
</script>

</body>
</html>
